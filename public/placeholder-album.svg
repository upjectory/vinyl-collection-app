<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="400" height="400" fill="#1f1f1f"/>
  
  <!-- Vinyl record background -->
  <circle cx="200" cy="200" r="150" fill="#0f0f0f"/>
  <circle cx="200" cy="200" r="145" fill="#1a1a1a"/>
  <circle cx="200" cy="200" r="70" fill="#0f0f0f"/>
  
  <!-- Record grooves -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="#262626" stroke-width="1"/>
  <circle cx="200" cy="200" r="130" fill="none" stroke="#262626" stroke-width="1"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="#262626" stroke-width="1"/>
  <circle cx="200" cy="200" r="110" fill="none" stroke="#262626" stroke-width="1"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#262626" stroke-width="1"/>
  <circle cx="200" cy="200" r="90" fill="none" stroke="#262626" stroke-width="1"/>
  <circle cx="200" cy="200" r="80" fill="none" stroke="#262626" stroke-width="1"/>
  
  <!-- Center label -->
  <circle cx="200" cy="200" r="65" fill="#333"/>
  <circle cx="200" cy="200" r="63" fill="#2d2d2d"/>
  <circle cx="200" cy="200" r="15" fill="#121212"/>
  
  <!-- Text -->
  <text x="200" y="180" font-family="Arial, sans-serif" font-size="14" fill="#999" text-anchor="middle">ALBUM</text>
  <text x="200" y="220" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">COVER</text>
</svg>