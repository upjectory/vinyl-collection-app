<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vinyl Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .vinyl-card {
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .vinyl-card:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 15px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-6">
    <div class="container mx-auto">
        <h1 class="text-4xl font-bold text-center mb-10 text-gray-800">My Vinyl Collection</h1>
        
        <div id="loading" class="text-center text-xl text-gray-600">
            Loading vinyl collection...
        </div>
        
        <div id="vinyl-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 hidden">
            <!-- Vinyl records will be dynamically inserted here -->
        </div>
        
        <div id="error" class="text-center text-red-500 hidden">
            Error loading vinyl collection. Please try again later.
        </div>
    </div>

    <script>
        async function fetchVinylData() {
            // Update this to use the full public sharing URL
            const sheetUrl = 'https://docs.google.com/spreadsheets/d/1xAzo6vCafjT6XekXP-nmN_gapEfnvyCjyyk4ZPo1K3I/pub?output=csv';

            try {
                // Fetch as CSV instead of JSON
                const response = await fetch(sheetUrl);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const csvText = await response.text();
                console.log('Raw CSV data:', csvText);

                // Use PapaParse to parse CSV
                const Papa = await import('https://cdn.jsdelivr.net/npm/papaparse@5.4.1/+esm');
                const parsedData = Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true
                });

                console.log('Parsed data:', parsedData);

                const vinylGrid = document.getElementById('vinyl-grid');
                const loading = document.getElementById('loading');
                
                // Clear loading, show grid
                loading.classList.add('hidden');
                vinylGrid.classList.remove('hidden');

                // Render vinyl records
                parsedData.data.forEach(vinylData => {
                    const vinylCard = document.createElement('div');
                    vinylCard.classList.add(
                        'vinyl-card', 
                        'bg-white', 
                        'rounded-lg', 
                        'overflow-hidden', 
                        'border', 
                        'border-gray-200', 
                        'p-4'
                    );
                    
                    vinylCard.innerHTML = `
                        <div class="text-center">
                            <h2 class="text-xl font-semibold text-gray-800 mb-2">${vinylData['Album'] || 'Unknown Album'}</h2>
                            <p class="text-gray-600 mb-1">${vinylData['Artist'] || 'Unknown Artist'}</p>
                            <div class="flex justify-between text-sm text-gray-500 mt-2">
                                <span>${vinylData['Year'] || 'N/A'}</span>
                                <span>${vinylData['Genre'] || 'N/A'}</span>
                            </div>
                        </div>
                    `;

                    vinylGrid.appendChild(vinylCard);
                });

                // If no records found
                if (parsedData.data.length === 0) {
                    const noRecords = document.createElement('p');
                    noRecords.classList.add('text-center', 'text-gray-500', 'col-span-full');
                    noRecords.textContent = 'No vinyl records found.';
                    vinylGrid.appendChild(noRecords);
                }
            } catch (error) {
                console.error('Detailed error fetching vinyl data:', error);
                
                const loading = document.getElementById('loading');
                const error = document.getElementById('error');
                
                loading.classList.add('hidden');
                error.classList.remove('hidden');
                error.textContent = `Error: ${error.message}. Check console for details.`;
            }
        }

        // Load vinyl data when the page loads
        fetchVinylData();
    </script>
</body>
</html>
