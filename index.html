<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vinyl Collection</title>
    <style>
        /* Base styles */
        :root {
            color-scheme: dark;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            line-height: 1.5;
        }
        
        /* Container */
        .container {
            width: 95%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 15px;
        }
        
        /* Header */
        header {
            background-color: #000;
            border-bottom: 1px solid #333;
            padding: 20px 0;
            margin-bottom: 30px;
        }
        
        .site-title {
            font-size: 28px;
            font-weight: bold;
            margin: 0;
        }
        
        .site-title .blue { color: #60A5FA; }
        .site-title .green { color: #34D399; }
        .site-title .purple { color: #A78BFA; }
        
        /* Loading state */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            font-size: 18px;
            color: #aaa;
        }
        
        /* Error message */
        .error {
            background-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }
        
        /* Albums grid */
        .albums-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        /* Album card */
        .album-card {
            background-color: #1f1f1f;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .album-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
        }
        
        .album-image-container {
            position: relative;
            padding-bottom: 100%; /* 1:1 aspect ratio */
            background-color: #111;
            overflow: hidden;
            cursor: pointer;
        }
        
        .album-image-container:hover::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 3px solid #34D399;
            border-radius: 4px;
            pointer-events: none;
        }
        
        .album-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .album-card:hover .album-image {
            transform: scale(1.05);
        }
        
        .album-category {
            position: absolute;
            top: 8px;
            right: 8px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            z-index: 1;
        }
        
        .album-favorite {
            position: absolute;
            top: 8px;
            left: 8px;
            color: #fbbf24;
            z-index: 1;
        }
        
        .spotify-link {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background-color: #1DB954;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s ease;
            z-index: 1;
        }
        
        .spotify-link:hover {
            transform: scale(1.1);
        }
        
        .album-info {
            padding: 12px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        .album-title {
            font-weight: 600;
            font-size: 14px;
            margin: 0 0 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .album-artist {
            font-size: 14px;
            color: #9ca3af;
            margin: 0 0 8px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .album-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #6b7280;
            margin-top: auto;
        }
        
        /* Footer */
        footer {
            background-color: #000;
            border-top: 1px solid #333;
            padding: 20px 0;
            margin-top: 40px;
            color: #9ca3af;
            font-size: 14px;
        }
        
        .counter {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 20px;
        }
        
        /* Responsive adjustments */
        @media (max-width: 640px) {
            .albums-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 15px;
            }
            
            .site-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1 class="site-title">
                My Vinyl Collection
            </h1>
        </div>
    </header>
    
    <main class="container">
        <div id="loading" class="loading">Loading vinyl collection...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="albums-grid" class="albums-grid" style="display: none;"></div>
        <div id="counter" class="counter" style="display: none;"></div>
    </main>
    
    <footer>
        <div class="container">
            <p>&copy; <span id="current-year"></span> My Vinyl Collection</p>
        </div>
    </footer>
    
    <script>
        // Set current year in footer
        document.getElementById('current-year').textContent = new Date().getFullYear();
        
        // Function to fetch data from Google Sheets
        async function fetchVinylData() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const albumsGrid = document.getElementById('albums-grid');
            const counter = document.getElementById('counter');
            
            try {
                // Published CSV URL from Google Sheets
                const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQY3A57SUa4yjeK-Sto5JRK2krLUxwROG-Qd4EjDriAwlhaDYljdom9jrUqDKRUCpXiAmdLKmFqwHFa/pub?output=csv';
                
                // Fetch the CSV data
                const response = await fetch(sheetUrl);
                
                if (!response.ok) {
                    throw new Error(`Failed to fetch data: ${response.status} ${response.statusText}`);
                }
                
                const csvText = await response.text();
                console.log("CSV data:", csvText.substring(0, 500)); // Log the first 500 chars for debugging
                
                // Parse CSV manually
                const rows = csvText.split('\n');
                const headers = parseCSVRow(rows[0]);
                console.log("Headers:", headers); // Log headers for debugging
                
                const albums = [];
                
                // Parse each row
                for (let i = 1; i < rows.length; i++) {
                    if (rows[i].trim() === '') continue;
                    
                    const values = parseCSVRow(rows[i]);
                    if (values.length < headers.length) continue;
                    
                    const album = {};
                    
                    // Map values to object properties
                    headers.forEach((header, index) => {
                        let value = values[index] || '';
                        
                        // Convert "true"/"false" strings to booleans
                        if (value.toLowerCase() === 'true') {
                            value = true;
                        } else if (value.toLowerCase() === 'false') {
                            value = false;
                        }
                        
                        // Convert numeric strings to numbers
                        if (header.toLowerCase() === 'year' && !isNaN(value)) {
                            value = parseInt(value, 10);
                        }
                        
                        album[header.toLowerCase()] = value;
                    });
                    
                    albums.push(album);
                }
                
                console.log("Parsed albums:", albums.slice(0, 2)); // Log first two albums for debugging
                
                // Display albums
                displayAlbums(albums);
                
                // Hide loading state
                loading.style.display = 'none';
                albumsGrid.style.display = 'grid';
                counter.style.display = 'block';
                counter.textContent = `Showing ${albums.length} records`;
                
            } catch (err) {
                console.error('Error fetching vinyl data:', err);
                loading.style.display = 'none';
                error.style.display = 'block';
                error.textContent = `Error: ${err.message}. Please try again later.`;
            }
        }
        
        // Helper function to parse CSV row properly
        function parseCSVRow(row) {
            const values = [];
            let inQuotes = false;
            let currentValue = '';
            
            for (let i = 0; i < row.length; i++) {
                const char = row[i];
                
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    values.push(currentValue.trim());
                    currentValue = '';
                } else {
                    currentValue += char;
                }
            }
            
            // Push the last value
            values.push(currentValue.trim());
            
            // Clean up values (remove surrounding quotes)
            return values.map(value => value.replace(/^"|"$/g, ''));
        }
        
        // Function to display albums
        function displayAlbums(albums) {
            const albumsGrid = document.getElementById('albums-grid');
            
            // Search for artwork using iTunes API if not available
            async function getAlbumArtwork(artist, title) {
                try {
                    // Build a search query URL for iTunes API
                    const query = `${encodeURIComponent(title)} ${encodeURIComponent(artist)}`;
                    const url = `https://itunes.apple.com/search?term=${query}&media=music&entity=album&limit=1`;
                    
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    // Extract the first result's artwork URL if available
                    if (data.results && data.results.length > 0) {
                        // Replace the 100x100 artwork with larger version
                        return data.results[0].artworkUrl100.replace('100x100', '600x600');
                    }
                    
                    return null;
                } catch (error) {
                    console.error('Error fetching artwork:', error);
                    return null;
                }
            }
            
            // Generate placeholder URL
            function getPlaceholderUrl(title, artist) {
                const encodedText = encodeURIComponent((artist || 'Album').substring(0, 10));
                return `https://placehold.co/400x400/121212/FFFFFF?text=${encodedText}`;
            }
            
            // Create album cards
            albums.forEach(album => {
                const card = document.createElement('div');
                card.className = 'album-card';
                
                const imageContainer = document.createElement('div');
                imageContainer.className = 'album-image-container';
                
                // Make the image container clickable if there's a spotify URL
                if (album.spotifyurl) {
                    imageContainer.onclick = function() {
                        window.open(album.spotifyurl, '_blank', 'noopener,noreferrer');
                    };
                }
                
                const image = document.createElement('img');
                image.className = 'album-image';
                image.src = album.artwork || getPlaceholderUrl(album.title, album.artist);
                image.alt = `${album.title} by ${album.artist}`;
                image.onerror = function() {
                    this.src = getPlaceholderUrl(album.title, album.artist);
                };
                
                imageContainer.appendChild(image);
                
                // Add category tag if present
                if (album.category) {
                    const category = document.createElement('div');
                    category.className = 'album-category';
                    category.textContent = album.category;
                    imageContainer.appendChild(category);
                }
                
                // Add favorite indicator if true
                if (album.favorite) {
                    const favorite = document.createElement('div');
                    favorite.className = 'album-favorite';
                    favorite.innerHTML = '★';
                    imageContainer.appendChild(favorite);
                }
                
                // Add Spotify link if available
                if (album.spotifyurl) {
                    const spotifyLink = document.createElement('a');
                    spotifyLink.className = 'spotify-link';
                    spotifyLink.href = album.spotifyurl;
                    spotifyLink.target = '_blank';
                    spotifyLink.rel = 'noopener noreferrer';
                    spotifyLink.innerHTML = 'S';
                    spotifyLink.title = 'Open in Spotify';
                    imageContainer.appendChild(spotifyLink);
                }
                
                const info = document.createElement('div');
                info.className = 'album-info';
                
                const title = document.createElement('h3');
                title.className = 'album-title';
                title.textContent = album.title || 'Unknown Title';
                
                const artist = document.createElement('p');
                artist.className = 'album-artist';
                artist.textContent = album.artist || 'Unknown Artist';
                
                const meta = document.createElement('div');
                meta.className = 'album-meta';
                
                const year = document.createElement('span');
                year.textContent = album.year || '';
                
                const genre = document.createElement('span');
                genre.textContent = album.genre || '';
                
                meta.appendChild(year);
                meta.appendChild(genre);
                
                info.appendChild(title);
                info.appendChild(artist);
                info.appendChild(meta);
                
                card.appendChild(imageContainer);
                card.appendChild(info);
                
                albumsGrid.appendChild(card);
                
                // Attempt to get album artwork from iTunes API if not available
                if (!album.artwork) {
                    getAlbumArtwork(album.artist, album.title).then(artworkUrl => {
                        if (artworkUrl) {
                            image.src = artworkUrl;
                        }
                    });
                }
            });
        }
        
        // Load data when the page loads
        document.addEventListener('DOMContentLoaded', fetchVinylData);
    </script>
</body>
</html>
