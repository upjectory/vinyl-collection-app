<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vinyl Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .vinyl-card {
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .vinyl-card:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 15px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-6">
    <div class="container mx-auto">
        <h1 class="text-4xl font-bold text-center mb-10 text-gray-800">My Vinyl Collection</h1>
        
        <div id="loading" class="text-center text-xl text-gray-600">
            Loading vinyl collection...
        </div>
        
        <div id="vinyl-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 hidden">
            <!-- Vinyl records will be dynamically inserted here -->
        </div>
        
        <div id="error" class="text-center text-red-500 hidden">
            Error loading vinyl collection. Please try again later.
        </div>
    </div>

    <script>
        async function fetchVinylData() {
            const sheetId = '1xAzo6vCafjT6XekXP-nmN_gapEfnvyCjyyk4ZPo1K3I';
            const sheetName = 'Sheet1';
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${sheetName}`;

            try {
                const response = await fetch(url);
                const text = await response.text();
                
                // Remove JSONP wrapper
                const jsonText = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonText);

                const rows = data.table.rows;
                const headers = data.table.cols.map(col => col.label);

                const vinylGrid = document.getElementById('vinyl-grid');
                const loading = document.getElementById('loading');
                
                // Clear loading, show grid
                loading.classList.add('hidden');
                vinylGrid.classList.remove('hidden');

                // Skip header row (index 0)
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i].c;
                    const vinylData = {};
                    
                    // Map row values to headers
                    headers.forEach((header, index) => {
                        vinylData[header] = row[index] ? row[index].v : 'Unknown';
                    });

                    const vinylCard = document.createElement('div');
                    vinylCard.classList.add(
                        'vinyl-card', 
                        'bg-white', 
                        'rounded-lg', 
                        'overflow-hidden', 
                        'border', 
                        'border-gray-200', 
                        'p-4'
                    );
                    
                    vinylCard.innerHTML = `
                        <div class="text-center">
                            <h2 class="text-xl font-semibold text-gray-800 mb-2">${vinylData['Album']}</h2>
                            <p class="text-gray-600 mb-1">${vinylData['Artist']}</p>
                            <div class="flex justify-between text-sm text-gray-500 mt-2">
                                <span>${vinylData['Year']}</span>
                                <span>${vinylData['Genre']}</span>
                            </div>
                        </div>
                    `;

                    vinylGrid.appendChild(vinylCard);
                }
            } catch (error) {
                console.error('Error fetching vinyl data:', error);
                
                const loading = document.getElementById('loading');
                const error = document.getElementById('error');
                
                loading.classList.add('hidden');
                error.classList.remove('hidden');
            }
        }

        // Load vinyl data when the page loads
        fetchVinylData();
    </script>
</body>
</html>
