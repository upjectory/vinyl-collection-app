<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vinyl Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .vinyl-card {
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .vinyl-card:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 15px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-6">
    <div class="container mx-auto">
        <h1 class="text-4xl font-bold text-center mb-10 text-gray-800">My Vinyl Collection</h1>
        
        <div id="loading" class="text-center text-xl text-gray-600">
            Loading vinyl collection...
        </div>
        
        <div id="vinyl-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 hidden">
            <!-- Vinyl records will be dynamically inserted here -->
        </div>
        
        <div id="error" class="text-center text-red-500 hidden">
            Error loading vinyl collection. Please try again later.
        </div>
    </div>

    <script>
        async function fetchVinylData() {
            // Published CSV URL from Google Sheets
            const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQY3A57SUa4yjeK-Sto5JRK2krLUxwROG-Qd4EjDriAwlhaDYljdom9jrUqDKRUCpXiAmdLKmFqwHFa/pub?output=csv';

            try {
                // Fetch CSV data
                const response = await fetch(sheetUrl);
                
                // Check if fetch was successful
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                // Get text content
                const csvText = await response.text();
                console.log('Raw CSV content:', csvText);

                // Parse CSV manually
                const rows = csvText.split('\n').map(row => {
                    // Use regex to properly split CSV with potential commas in fields
                    return row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [];
                });

                const headers = rows[0];
                
                const vinylGrid = document.getElementById('vinyl-grid');
                const loading = document.getElementById('loading');
                
                // Clear loading, show grid
                loading.classList.add('hidden');
                vinylGrid.classList.remove('hidden');

                // Skip header row (index 0)
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    
                    // Skip empty rows
                    if (row.length < 4) continue;

                    // Remove quotes if present
                    const cleanValue = (val) => val ? val.replace(/^"|"$/g, '').trim() : 'Unknown';

                    const vinylData = {
                        Album: cleanValue(row[0]),
                        Artist: cleanValue(row[1]),
                        Year: cleanValue(row[2]),
                        Genre: cleanValue(row[3])
                    };

                    const vinylCard = document.createElement('div');
                    vinylCard.classList.add(
                        'vinyl-card', 
                        'bg-white', 
                        'rounded-lg', 
                        'overflow-hidden', 
                        'border', 
                        'border-gray-200', 
                        'p-4'
                    );
                    
                    vinylCard.innerHTML = `
                        <div class="text-center">
                            <h2 class="text-xl font-semibold text-gray-800 mb-2">${vinylData.Album}</h2>
                            <p class="text-gray-600 mb-1">${vinylData.Artist}</p>
                            <div class="flex justify-between text-sm text-gray-500 mt-2">
                                <span>${vinylData.Year}</span>
                                <span>${vinylData.Genre}</span>
                            </div>
                        </div>
                    `;

                    vinylGrid.appendChild(vinylCard);
                }

                // If no records found
                if (vinylGrid.children.length === 0) {
                    throw new Error('No vinyl records found in the spreadsheet');
                }
            } catch (error) {
                console.error('Error fetching vinyl data:', error);
                
                const loading = document.getElementById('loading');
                const errorDiv = document.getElementById('error');
                
                // Update error message with specific error
                errorDiv.textContent = `Error: ${error.message}. Check console for details.`;
                
                loading.classList.add('hidden');
                errorDiv.classList.remove('hidden');
            }
        }

        // Load vinyl data when the page loads
        fetchVinylData();
    </script>
</body>
</html>
